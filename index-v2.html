// ── Results Table ──────────────────────────────────────────────────
function renderResults(){
  const empty=document.getElementById('results-empty');
  const tbl=document.getElementById('results-table');
  const body=document.getElementById('results-body');
  document.getElementById('result-count').textContent=results.length;
  // 統計目前還有多少句不確定句「沒有真正拿到 AI 判斷」（字典 fallback），
  // 讓使用者不用自己一份份檔案點開檢查，就知道要不要按「補套用 AI」、按下去大概要處理多少句
  let uncPending = 0;
  results.forEach(r => { (r.uncIndices||[]).forEach(u => { if (!r.details[u.detailIdx].aiRefined) uncPending++; }); });
  document.getElementById('unc-pending-count').textContent = uncPending>0 ? `還有 ${uncPending} 句不確定句未套用 AI` : '';
  if(!results.length){empty.style.display='block';tbl.style.display='none';return;}
  empty.style.display='none'; tbl.style.display='table';
  body.innerHTML=results.map((r,i)=>{
    const tp=r.counts.P.pos+r.counts.P.pos_u+r.counts.Q.pos+r.counts.Q.pos_u;
    const tn=r.counts.P.neg+r.counts.P.neg_u+r.counts.Q.neg+r.counts.Q.neg_u;
    const tl=r.counts.P.lit+r.counts.Q.lit;
    const tu=r.counts.P.unc+r.counts.Q.unc;
    const tneu=(r.counts.P.neutral||0)+(r.counts.Q.neutral||0);
    const ts=r.counts.P.total+r.counts.Q.total;
    const tc=toneColor(r.Tone_T);
    return `<tr class="fade-in">
      <td style="font-weight:700;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.name)}</td>
      <td class="mono" style="color:${toneColor(r.Tone_P)}">${r.Tone_P.toFixed(4)}</td>
      <td class="mono" style="color:${toneColor(r.Tone_Q)}">${r.Tone_Q.toFixed(4)}</td>
      <td><span class="mono" style="font-weight:700;color:${tc}">${r.Tone_T.toFixed(4)}</span>${toneBar(r.Tone_T,tc)}</td>
      <td class="mono" style="color:var(--pos)">${tp}</td>
      <td class="mono" style="color:var(--neg)">${tn}</td>
      <td class="mono" style="color:var(--lit)">${tl}</td>
      <td class="mono" style="color:var(--unc)">${tu}</td>
      <td class="mono" style="color:var(--neu)">${tneu}</td>
      <td class="mono" style="color:var(--tx2)">${ts}</td>
      <td>${aiBadge(r)}</td>
      <td><button class="view-btn" onclick="openModal(${i})">查看 →</button></td>
    </tr>`;
  }).join('');
  // stats
  document.getElementById('export-card').style.display='block';
  document.getElementById('stats-card').style.display='block';
  const avg=(results.reduce((s,r)=>s+r.Tone_T,0)/results.length).toFixed(3);
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat"><div class="stat-n" style="color:var(--pos)">${results.length}</div><div class="stat-l">已分析樣本</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--a2)">${avg}</div><div class="stat-l">平均 Tone_T</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--pos)">${results.filter(r=>r.Tone_T>0).length}</div><div class="stat-l">正向樣本數</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--neg)">${results.filter(r=>r.Tone_T<0).length}</div><div class="stat-l">負向樣本數</div></div>`;
}

// ── Detail Modal ───────────────────────────────────────────────────
const CAT_LABEL={POS:'正向',NEG:'負向',LIT:'法律',UNC:'不確定',NEUTRAL:'中性排除',NONE:'無命中'};
const CAT_CLS={POS:'b-pos',NEG:'b-neg',LIT:'b-lit',UNC:'b-unc',NEUTRAL:'b-neu',NONE:'b-none'};

function openModal(idx){
  detailResult=results[idx];
  modalFilter='ALL';
  document.getElementById('modal-title').innerHTML=`${escapeHtml(detailResult.name)} ${aiBadge(detailResult)}`;
  renderModal();
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function renderModal(){
  const d=detailResult;
  const cats=['ALL','POS','NEG','LIT','UNC','NEUTRAL','NONE'];
  const counts={};
  cats.forEach(c=>{counts[c]=c==='ALL'?d.details.length:d.details.filter(x=>x.localCat.split('+').includes(c)).length;});
  document.getElementById('modal-filters').innerHTML=cats.map(c=>`
    <button class="filt-btn${modalFilter===c?' active':''}" onclick="setFilter('${c}')">
      ${c==='ALL'?`全部 (${counts[c]})`:CAT_LABEL[c]+` (${counts[c]})`}
    </button>`).join('');
  const filtered=modalFilter==='ALL'?d.details:d.details.filter(x=>x.localCat.split('+').includes(modalFilter));
  document.getElementById('modal-body').innerHTML=filtered.length?filtered.map(row=>{
    const rowCats=row.localCat.split('+');
    const chips=[
      ...row.posWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-pos">+${w}</span>`),
      ...row.negWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-neg">−${w}</span>`),
      ...row.litWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-lit">§${w}</span>`),
      ...row.uncWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-unc">?${w}</span>`),
    ].join('');
    // 字典猜測（uncRefine 關鍵字規則）跟 AI 真的確認過，視覺上要一眼就能分清楚，
    // 不能只靠容易被忽略的「(AI)」小字尾巴——這正是先前造成使用者誤判的原因
    const refBadge=row.refine>0?(row.aiRefined
      ? `<span class="badge" style="background:rgba(124,58,237,.25);color:var(--a2);border:1px solid rgba(124,58,237,.5)">${row.refine===1?'▲ 正向':'▼ 負向'}・AI 已確認</span>`
      : `<span class="badge" style="background:rgba(148,163,184,.15);color:var(--tx2);border:1px dashed var(--bd)">${row.refine===1?'▲ 正向':'▼ 負向'}・字典猜測（未套用 AI）</span>`
    ):'';
    const catBadges=rowCats.map(c=>`<span class="badge ${CAT_CLS[c]}">${CAT_LABEL[c]}</span>`).join('');
    return `<div class="s-card${rowCats.includes('NEUTRAL')?' neutral':''}">
      <div class="s-meta">
        ${catBadges}
        <span class="badge b-none">${row.role===1?'管理層':'非管理層'}</span>
        <span class="badge b-none">${row.phase===0?'報告段':'問答段'}</span>
        ${refBadge}
      </div>
      <div class="s-text${rowCats.includes('NEUTRAL')?' dim':''}">${escapeHtml(row.sentence)}</div>
      ${chips?`<div class="chips">${chips}</div>`:''}
    </div>`;
  }).join(''):'<div style="text-align:center;color:var(--tx2);font-size:12px;padding:40px">無相符句子</div>';
}
function setFilter(f){modalFilter=f;renderModal();}

// ── Export ─────────────────────────────────────────────────────────
function csvEsc(v){ return `"${String(v==null?'':v).replace(/"/g,'""')}"`; }
function exportSummary(){
  if(!results.length) return;
  const hdr='Company,Tone_P,Tone_Q,Tone_T,Pos_P,Neg_P,Lit_P,Unc_P,Neutral_P,Total_P,Pos_Q,Neg_Q,Lit_Q,Unc_Q,Neutral_Q,Total_Q,AI_Status,UNC_AI_Confirmed_Pct\n';
  const rows=results.map(r=>{
    const{P,Q}=r.counts;
    const uncTotal = (P.unc||0)+(Q.unc||0);
    const uncConfirmed = (r.details||[]).filter(d=>d.aiRefined).length;
    const uncPct = uncTotal>0 ? (uncConfirmed/uncTotal*100).toFixed(1) : '';
    return `${csvEsc(r.name)},${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)},${P.pos+P.pos_u},${P.neg+P.neg_u},${P.lit},${P.unc},${P.neutral||0},${P.total},${Q.pos+Q.pos_u},${Q.neg+Q.neg_u},${Q.lit},${Q.unc},${Q.neutral||0},${Q.total},${csvEsc(aiStatusText(r))},${uncPct}`;
  });
  dl('\uFEFF'+hdr+rows.join('\n'),'Tone_Summary.csv');
}
function exportDetail(){
  if(!results.length) return;
  const hdr='Company,Sentence,Role,Phase,LocalCat,Refine,AiRefined,PosWords,NegWords,LitWords,UncWords,Tone_P,Tone_Q,Tone_T\n';
  const rows=[];
  results.forEach(r=>{
    (r.details||[]).forEach(d=>{
      rows.push(`${csvEsc(r.name)},${csvEsc((d.sentence||'').replace(/\n/g,' '))},${d.role},${d.phase},${d.localCat},${d.refine},${d.aiRefined?1:0},${csvEsc(d.posWords)},${csvEsc(d.negWords)},${csvEsc(d.litWords)},${csvEsc(d.uncWords)},${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)}`);
    });
  });
  dl('\uFEFF'+hdr+rows.join('\n'),'Tone_Detail.csv');
}
function dl(content,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/csv;charset=utf-8;'}));
  a.download=filename; a.click();
}
