<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneTurbo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--bd:#30363d;--ac:#7c3aed;--a2:#a78bfa;--pos:#34d399;--neg:#f87171;--lit:#fb923c;--unc:#94a3b8;--neu:#64748b;--tx:#e6edf3;--tx2:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fade-in{animation:fadeIn .3s ease-out}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px}
.btn{border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.btn-primary{background:var(--ac);color:#fff;width:100%}
.btn-primary:hover{background:#6d28d9;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--s2);color:var(--tx2);cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--tx2)}
.btn-ghost:hover{border-color:var(--a2);color:var(--a2)}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
input,textarea,select{background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 13px;font-size:13px;font-family:'Noto Sans TC',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--a2)}
textarea{resize:vertical;min-height:110px}
input::placeholder,textarea::placeholder{color:var(--tx2)}
.layout{max-width:1280px;margin:0 auto;padding:24px 20px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
.col{display:flex;flex-direction:column;gap:16px}
/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.logo-box{background:linear-gradient(135deg,#7c3aed,#9d4edd);padding:10px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
.logo-text span{background:linear-gradient(135deg,var(--ac),#9d4edd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
/* Tabs */
.tab-bar{display:flex;background:var(--s2);border-radius:8px;padding:3px;gap:2px;margin-bottom:14px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--tx2);border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.tab.active{background:var(--ac);color:#fff}
/* Upload zone */
.upload-zone{border:2px dashed var(--bd);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--ac);background:rgba(124,58,237,.05)}
/* Queue */
.queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.q-item{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700}
.q-item.active{border-color:var(--ac);background:rgba(124,58,237,.1)}
.q-item.done{border-color:var(--pos)}
.q-item.error{border-color:var(--neg)}
/* Progress */
.prog{height:8px;background:#161b22;border-radius:4px;overflow:hidden;margin-top:12px;margin-bottom:4px;border:1px solid #30363d}
.prog-fill{height:100%;background:linear-gradient(90deg, #7c3aed, #a78bfa);transition:width .3s;border-radius:4px}
/* Table */
table{width:100%;border-collapse:collapse}
th{background:var(--s2);padding:9px 12px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);text-align:left;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
/* Tone bar */
.tbar{width:70px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:5px}
.tbar-fill{height:100%;border-radius:3px}
/* Badges */
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.b-pos{background:rgba(52,211,153,.15);color:var(--pos)}
.b-neg{background:rgba(248,113,113,.15);color:var(--neg)}
.b-lit{background:rgba(251,146,60,.15);color:var(--lit)}
.b-unc{background:rgba(148,163,184,.15);color:var(--unc)}
.b-neu{background:rgba(100,116,139,.15);color:var(--neu)}
.b-none{background:var(--s2);color:var(--tx2)}
.b-ai-on{background:rgba(52,211,153,.15);color:var(--pos);display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.b-ai-off{background:rgba(251,146,60,.15);color:var(--lit);display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.b-ai-err{background:rgba(248,113,113,.15);color:var(--neg);display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px}
.stat-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em}
/* API key bar */
.api-bar{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.api-bar.on{border-color:rgba(52,211,153,.5)}
.api-bar.off{border-color:rgba(251,146,60,.4)}
/* Detail modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;animation:fadeIn .2s ease-out}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.modal-body{overflow-y:auto;padding:14px 22px;flex:1}
.filter-bar{padding:10px 22px;border-bottom:1px solid var(--bd);display:flex;gap:5px;flex-wrap:wrap}
.filt-btn{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.filt-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
/* Sentence card */
.s-card{margin-bottom:8px;padding:11px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)}
.s-card.neutral{background:rgba(100,116,139,.05);border-color:rgba(100,116,139,.3)}
.s-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.s-text{font-size:13px;line-height:1.6;margin-bottom:6px}
.s-text.dim{color:var(--tx2)}
.chips{display:flex;flex-wrap:wrap;gap:2px;padding-top:8px;border-top:1px solid var(--bd)}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block}
.cp-pos{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--pos)}
.cp-neg{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--neg)}
.cp-lit{background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.3);color:var(--lit)}
.cp-unc{background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.3);color:var(--unc)}
/* Exclusion panel */
.excl-panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.excl-hdr{width:100%;padding:11px 14px;background:transparent;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.excl-body{padding:0 14px 14px;border-top:1px solid var(--bd)}
.excl-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);color:var(--neu);margin:3px}
.excl-tag button{background:none;border:none;cursor:pointer;color:var(--neu);font-size:11px;opacity:.6;padding:0}
.excl-tag button:hover{opacity:1;color:var(--neg)}
.cat-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-right:5px}
.cat-greeting{background:rgba(52,211,153,.1);color:#6ee7b7}
.cat-serial{background:rgba(251,146,60,.1);color:#fdba74}
.cat-time{background:rgba(148,163,184,.1);color:#94a3b8}
.cat-presentation{background:rgba(99,102,241,.1);color:#a5b4fc}
.cat-closing{background:rgba(248,113,113,.1);color:#fca5a5}
.cat-qa_host{background:rgba(251,191,36,.1);color:#fcd34d}
.cat-transition{background:rgba(34,211,238,.1);color:#67e8f9}
.cat-custom{background:rgba(167,139,250,.1);color:var(--a2)}
/* Processing badge */
.proc-badge{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--ac);border-radius:10px;padding:7px 14px}
/* scroll */
.scroll-box{overflow-y:auto;overflow-x:auto}
/* empty state */
.empty{padding:50px;text-align:center;color:var(--tx2);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
/* detail view btn */
.view-btn{font-size:10px;font-weight:700;color:var(--a2);background:transparent;border:1px solid rgba(124,58,237,.4);border-radius:6px;padding:3px 8px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.view-btn:hover{background:rgba(124,58,237,.2)}
footer{margin-top:36px;text-align:center;padding:18px;border-top:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase}
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div>
        <div class="logo-text">ToneTurbo <span>Pro</span></div>
        <div class="sub">管理階層語調分析系統</div>
      </div>
    </div>
    <div id="proc-badge" style="display:none" class="proc-badge">
      <div style="width:14px;height:14px;border:2px solid var(--s2);border-top-color:var(--a2);border-radius:50%" class="spin"></div>
      <span class="mono" style="font-size:10px;color:var(--a2);font-weight:700;letter-spacing:.08em" id="proc-text">PROCESSING</span>
    </div>
  </div>

  <div id="restore-banner" class="card fade-in" style="display:none;padding:12px 16px;margin-bottom:16px;border-color:rgba(124,58,237,.4);align-items:center;justify-content:space-between;gap:12px">
    <span style="font-size:11px;color:var(--tx2)" id="restore-banner-text"></span>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-ghost" style="width:auto;padding:6px 12px;font-size:10px" onclick="restoreBackup()">恢復結果</button>
      <button class="btn btn-ghost" style="width:auto;padding:6px 12px;font-size:10px" onclick="dismissBackup()">忽略</button>
    </div>
  </div>

  <div class="grid">
    <!-- Left Panel -->
    <div class="col">
      <!-- API Key -->
      <div class="api-bar off" id="api-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--lit)" stroke-width="2.5" id="api-icon"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <div style="flex:1;min-width:0">
          <div style="font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;color:var(--lit)" id="api-label">Gemini AI 二次分析 ○ 未設定</div>
          <div style="display:flex;gap:6px;margin-bottom:4px">
            <input type="password" id="api-key" placeholder="貼上 Gemini API Key..." style="flex:1;padding:5px 8px;font-size:11px;min-width:0">
            <button class="btn btn-ghost" onclick="toggleApiKey()" style="width:auto;padding:4px 8px;font-size:10px" id="api-toggle">顯示</button>
          </div>
        </div>
        <span id="ai-status"></span>
      </div>
      <div id="quota-banner" style="display:none;background:rgba(239,68,68,.12);border:1px solid var(--neg);border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.5;color:var(--neg);margin:-4px 0 12px"></div>

      <!-- Exclusion Panel -->
      <div class="excl-panel" id="excl-panel">
        <button class="excl-hdr" onclick="toggleExcl()">
          <div style="display:flex;align-items:center;gap:8px">
            <span>🚫</span>
            <span style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--neu)">中性排除清單</span>
            <span id="excl-count" style="font-size:10px;background:rgba(100,116,139,.2);color:var(--neu);border-radius:10px;padding:1px 8px;font-weight:700"></span>
          </div>
          <span id="excl-arrow" style="color:var(--tx2);font-size:12px;transition:transform .2s">▼</span>
        </button>
        <div id="excl-body" style="display:none" class="excl-body">
          <div id="excl-cats"></div>
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)">
            <div style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">新增自訂排除詞</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <input id="new-word" placeholder="輸入詞語或開頭..." style="flex:1;min-width:90px;padding:6px 10px;font-size:12px" onkeydown="if(event.key==='Enter')addExclusion()">
              <select id="new-type" style="padding:6px 8px;font-size:11px;width:auto">
                <option value="prefix">開頭符合</option>
                <option value="contains">包含詞語</option>
                <option value="exact">完整符合</option>
                <option value="regex">正規表示式</option>
              </select>
              <button class="btn btn-ghost" onclick="addExclusion()" style="width:auto;padding:6px 10px;font-size:11px">＋ 新增</button>
              <button class="btn btn-ghost" onclick="resetExclusions()" style="width:auto;padding:6px 8px;font-size:10px">重置</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Upload Card -->
      <div class="card" style="padding:18px">
        <div class="tab-bar">
          <button class="tab active" id="tab-batch" onclick="switchTab('batch')">批次上傳</button>
          <button class="tab" id="tab-manual" onclick="switchTab('manual')">手動貼上</button>
        </div>
        <div id="pane-batch">
          <label class="upload-zone" style="display:block;cursor:pointer">
            <input type="file" multiple accept=".txt" onchange="handleFiles(this)" style="display:none">
            <svg style="margin:0 auto 10px;color:var(--tx2);display:block" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <div style="font-size:11px;color:var(--tx2);font-weight:700;letter-spacing:.08em;text-transform:uppercase">點擊上傳 .txt 檔案</div>
          </label>
          <button class="btn btn-ghost" onclick="addTestSample()" style="width:100%;margin-top:10px">＋ 加入測試樣本</button>
          <div style="margin-top:10px;padding:8px 12px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)">
            <p style="font-size:10px;color:var(--tx2);margin:0;line-height:1.6">💡 <strong style="color:var(--a2)">手動標記 Q&A 起點</strong>：在逐字稿中插入一行 <code style="background:var(--bg);padding:1px 5px;border-radius:3px;color:var(--a2)">#QA_START</code>，分析時將從該行起切換為問答段</p>
          </div>
        </div>
        <div id="pane-manual" style="display:none">
          <input id="m-name" placeholder="樣本 ID（如：2330）" style="margin-bottom:8px">
          <textarea id="m-text" placeholder="在此貼上逐字稿全文..."></textarea>
          <button class="btn btn-ghost" onclick="addManual()" style="width:100%;margin-top:8px">加入分析佇列</button>
        </div>
        <div id="prog-wrap" style="display:none">
          <div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
          <div class="mono" style="font-size:9px;color:var(--tx2);text-align:right;margin-top:5px" id="prog-text">0/0</div>
        </div>
        <button class="btn btn-primary" style="margin-top:12px" id="run-btn" onclick="runBatch()" disabled>▶ 啟動批次分析</button>
        <button class="btn btn-ghost" style="margin-top:8px;display:none;color:var(--neg);border-color:rgba(248,113,113,.4)" id="abort-btn" onclick="abortBatch()">■ 中止本次分析</button>
      </div>

      <!-- Export Card -->
      <div class="card fade-in" id="export-card" style="display:none;padding:18px;border-color:rgba(124,58,237,.3)">
        <div style="font-size:9px;font-weight:700;color:var(--a2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">匯出報表</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-ghost" onclick="exportSummary()" style="text-align:left;padding:9px 13px">📊 摘要報表（每公司一行）</button>
          <button class="btn btn-ghost" onclick="exportDetail()" style="text-align:left;padding:9px 13px">📋 完整明細（含逐句分析）</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="card fade-in" id="stats-card" style="display:none;padding:18px">
        <div style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">整體統計</div>
        <div class="stat-grid" id="stat-grid"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="col">
      <!-- Queue -->
      <div class="card" style="overflow:hidden">
        <div style="padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
          <span class="mono" style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase">BATCH QUEUE (<span id="q-count">0</span>)</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" style="padding:3px 9px;font-size:9px" id="clear-queue-btn" onclick="clearQueue()">清除佇列</button>
            <button class="btn btn-ghost" style="padding:3px 9px;font-size:9px" id="clear-all-btn" onclick="clearAll()">全部清除</button>
          </div>
        </div>
        <div class="scroll-box" style="max-height:150px;padding:10px 14px">
          <div id="queue-empty" class="empty" style="padding:20px">尚未加入任何樣本</div>
          <div id="queue-grid" class="queue-grid"></div>
        </div>
      </div>

      <!-- Results Table -->
      <div class="card" style="overflow:hidden">
        <div style="padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="mono" style="font-size:9px;font-weight:700;color:var(--a2);letter-spacing:.12em;text-transform:uppercase">EMPIRICAL RESULTS</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="mono" style="font-size:9px;color:var(--unc)" id="unc-pending-count"></span>
            <button class="btn btn-ghost" style="width:auto;padding:4px 10px;font-size:10px" id="reapply-ai-btn" onclick="reapplyAI()" title="不重新上傳、不重新解析檔案，只針對還沒真正拿到 AI 判斷的不確定句再送一次 AI（例如額度重置後想補完殘留的失敗句子）">補套用 AI（僅未確認句）</button>

// ── 狀態 ──────────────────────────────────────────────────────────
let queue = [], results = [], exclusions = [...DEFAULT_EXCLUSIONS], processing = false, currentIdx = -1, detailResult = null, modalFilter = 'ALL';
// 當偵測到 Google 回傳「每日額度 (RPD) 已用完」時設為 true：這種額度要等到太平洋時間午夜才會重置，
// 同一次執行內不管重試幾次、等多久都不可能恢復，跟 RPM/TPM 那種幾秒~一分鐘內會恢復的暫時性限制不同。
// 一旦確認是這種情況，後續所有 AI 呼叫直接跳過重試、快速 fallback 回字典，避免對 2000+ 份檔案的批次
// 每個 chunk 都白白重試+等待數十秒到數分鐘，浪費使用者的時間。
let dailyQuotaExhausted = false;
// 使用者主動按下「中止本次分析」時設為 true。批次規模一大（2000+ 份檔案）、
// 又疊加 chunk 內重試＋sweep 整輪重試，最壞情況可能卡上數十分鐘，使用者除了整頁重新整理
// （會遺失所有尚未寫出的進度）之外沒有其他脫身手段，所以需要一個能真正中斷重試迴圈的旗標，
// 用法跟 dailyQuotaExhausted 一致：所有重試/等待迴圈都要檢查它並提早跳出
let userAborted = false;

// ── 排除判斷 ──────────────────────────────────────────────────────
function isNeutral(sent) {
  for (const ex of exclusions) {
    try {
      if (ex.type==='exact' && sent===ex.value) return true;
      if (ex.type==='prefix' && sent.startsWith(ex.value)) return true;
      if (ex.type==='contains' && sent.includes(ex.value)) return true;
      if (ex.type==='regex' && new RegExp(ex.value).test(sent)) return true;
    } catch(e){}
  }
  return false;
}

// 否定詞：緊接在字典詞「正前方」時，代表這個詞被否定了（例如「並未達到」「沒有影響」），
// 不能直接照字面算進原本的類別。實測真實語料發現：POS 字典命中裡有 2.00% 緊接在否定詞後面
// （NEG 只有 1.13%），兩邊都有、但 POS 被誤判成正向的比例明顯更高，是把分數往正面推的原因之一。
// 抓不到「否定詞→應該反轉成哪個類別」這麼細（例如「沒有風險」其實偏正向、「不會成長」其實偏負向，
// 沒有通用規則），所以保守處理：偵測到緊鄰否定詞就直接不算進該類別（視為中性），而不是硬猜要翻到哪一類。
const NEGATION_MARKERS = /(不|沒有|沒|無|未|尚未|未曾|難以|無法|並未|並無)$/;
// 少數狀況是「否定詞（只有 1 個字）+ 字典詞」剛好黏成另一個意義完全不同的固定複合詞，
// 不是「這個詞被否定」——例如「不動產」（房地產類資產）跟字典詞「動產」（可移動財產）是兩個對比詞，
// 不是「動產」被「不」否定，實測全語料有 703 句因此被誤判排除。之後如果實測發現同類狀況可以繼續加。
const NEGATION_FALSE_POSITIVES = new Set(['不動產']);
function matches(sent, dict) {
  const found = [];
  for (const w of dict) {
    if (!w) continue;
    let idx = sent.indexOf(w);
    let hit = false;
    while (idx !== -1) {
      const before = sent.slice(Math.max(0, idx - 4), idx);
      const oneCharCombo = sent.slice(Math.max(0, idx - 1), idx + w.length);
      if (NEGATION_FALSE_POSITIVES.has(oneCharCombo) || !NEGATION_MARKERS.test(before)) { hit = true; break; }
      idx = sent.indexOf(w, idx + w.length);
    }
    if (hit) found.push(w);
  }
  return found;
}

// 一次算出四個字典的命中詞清單，count 用 .length 推導，避免同一句話對同一份字典重複掃描兩次
function dictMatches(sent) {
  return {
    POS: matches(sent, DICTS.POS),
    NEG: matches(sent, DICTS.NEG),
    LIT: matches(sent, DICTS.LIT),
    UNC: matches(sent, DICTS.UNC),
  };
}

// 回傳陣列：正常只有一個類別，打平時多個類別並列（例如 ['POS','NEG']）
function localCat(sent, m) {
  if (isNeutral(sent)) return ['NEUTRAL'];
  const counts = {POS:m.POS.length, NEG:m.NEG.length, LIT:m.LIT.length, UNC:m.UNC.length};
  const max = Math.max(counts.POS, counts.NEG, counts.LIT, counts.UNC);
  if (max === 0) return ['NONE'];
  const winners = Object.keys(counts).filter(k => counts[k] === max);
  // 「雖然...但是...」這種一句話同時褒貶皆有的句子，原本是詞數多的一方整句通吃、少的一方訊號被完全丟棄
  // （實測：真實語料裡同句命中 POS 又命中 NEG 的句子佔 8.10%，其中詞數多的一方通吃時，
  // POS 通吃掉 NEG 訊號的次數是反過來（NEG 通吃掉 POS）的 2.7 倍，是把分數推向正面的另一個原因）。
  // 只要 POS、NEG 在同一句都有命中，不管誰的詞數比較多，兩邊都保留，讓 calcTone 的分子自然相抵，
  // 而不是誰詞多就吃掉對方——跟原本「剛好平手才兩個都算」的行為一致，只是不再要求「剛好平手」這個條件
  if (counts.POS > 0 && counts.NEG > 0) {
    const set = new Set(winners);
    set.add('POS'); set.add('NEG');
    return [...set];
  }
  return winners;
}

// 管理層職稱關鍵字（純職稱，不含姓名）
const MGMT_TITLES = /總經理|執行長|CEO|CFO|COO|CTO|副總|董事長|董事|首席|主管|協理|經理|財務長|發言人|副發言人|管理層|會計主管|業務|資深/;
// 非管理層關鍵字：用於從 **姓名-職稱** 或 **職稱** 標籤中抽出的「職稱字串」比對，字串本身短且精確，可以用較寬鬆的清單
const NON_MGMT_TITLES = /Investor\s*Relation|IR|主持人|司儀|媒體|分析師|投資人|記者|聽眾|研究員|主持|座談|法說|證券|投顧/;
// 整句關鍵字比對時（沒有標籤格式），只信任「明確的發言人標籤前綴」（如句首「主持人：」），
// 避免「法說」「媒體」「投資人」「證券」這類管理層自己講話時也常提及的泛用詞被誤判成非管理層，
// 進而透過上下文延續機制把後面整份逐字稿都錯誤標成非管理層
const NON_MGMT_LABEL_PREFIX = /^(主持人|司儀|分析師|投資人|法人|媒體|記者|Investor\s*Relation|IR)[:：]/i;
// 句首「稱謂+職稱+早安/午安/你好」通常是別人在跟該職稱的人打招呼（例如分析師提問前的開場白：「王經理，早安」），
// 不是該職稱本人自稱，這種模式很明確、風險低，跟上面「感謝/請+職稱」那種可能是自己人交接發言的情況不同
const GREETING_TO_TITLE_PAT = /^.{0,6}(總經理|執行長|CEO|CFO|COO|CTO|副總|董事長|經理|協理|財務長|發言人)[，,、]\s*(早安|午安|晚安|您好|你好|大家好)/;

// 回傳 1(管理層)/0(非管理層)/null(無法判斷，交由上層決定 fallback 或送 AI)
function getRole(sent, lastRole) {
  // 1. 優先解析 **姓名 - 公司, 職稱** 格式（最可靠）
  const labelPat = /\*\*[^*]+-[^*]+,\s*([^*]+)\*\*/;
  const labelMatch = sent.match(labelPat);
  if (labelMatch) {
    const title = labelMatch[1].trim();
    if (MGMT_TITLES.test(title)) return 1;
    if (NON_MGMT_TITLES.test(title)) return 0;
  }

  // 2. 解析 **職稱** 單獨格式
  const boldPat = /\*\*([^*]+)\*\*/;
  const boldMatch = sent.match(boldPat);
  if (boldMatch) {
    const title = boldMatch[1].trim();
    if (MGMT_TITLES.test(title)) return 1;
    if (NON_MGMT_TITLES.test(title)) return 0;
  }

  // 3. 句子本身含明確職稱（無粗體標籤時的次要判斷）
  // 註：曾嘗試加入「感謝/請+職稱→視為他人稱呼、判非管理層」的規則，
  // 但實測真實逐字稿後發現：管理層之間互相交接發言（謝謝董事長，接下來由我報告…）
  // 也會用一樣的說法，誤判後又會透過第 5 步的上下文延續機制擴散，破壞性遠大於它想解決的問題，故不採用。
  if (GREETING_TO_TITLE_PAT.test(sent.trim())) return 0;
  if (MGMT_TITLES.test(sent)) return 1;
  if (NON_MGMT_LABEL_PREFIX.test(sent.trim())) return 0;

  // 4. 上下文保持（沿用前一句角色）
  if (lastRole !== null) return lastRole;

  // 5. 真的無法判斷
  return null;
}

// getPhase 已移除：phase 由 ### Q&A 標記單向控制，見 analyzePhases

function uncRefine(sent) {
  if (/(成長|擴張|增長|提升|擴大|發展|上升)/.test(sent)) return 1;
  if (/(風險|壓力|困難|不確定|危險|挑戰|下滑)/.test(sent)) return 2;
  return 0;
}

function calcTone(s) {
  const p = s.pos + s.pos_u, n = s.neg + s.neg_u, l = s.lit;
  const d = s.pos + s.neg + s.lit + s.unc; // 分母＝正向+負向+爭議+不確定（不含 NONE 與中性排除句）
  return d === 0 ? 0 : (p - n - l) / d;
}

// ── 逐字稿切分／分段判斷用的常數（多份檔案共用，跟原本每份各自定義的行為完全一樣） ──
const QA_START_PAT = /^#{1,3}\s*(q&a|問答|問答環節|提問|analyst\s*q)|^#QA_START/i;
// 只有「逐字稿開始」標題才算開場白邊界；不能把 q&a/問答環節 也算進來，
// 否則當逐字稿只有 ## Q&A 這種標題、沒有 ## Transcript 時，會把報告段跟 Q&A 標題本身都當成開場白吃掉
const TRANSCRIPT_START_PAT = /^#{1,3}\s*(transcript|逐字稿)/i;
// 實測台股法說會真實逐字稿後發現：光靠固定詞序（例如「Q&A 時間」）漏抓率很高，
// 因為口語常常是「進行 Q&A」「Q&A 的環節」「意見交流」「問與答」等各種詞序與同義詞。
// 改用「Q&A 概念詞」+「轉場/開始詞」同句共現來判斷，涵蓋詞序更寬鬆的真實說法；
// 另外每題前綴「投資先進提問：」這類標籤格式，直接視為已進入問答。
const QA_CONCEPT_PAT = /Q\s*&?\s*A|問答|提問|意見交(換|流)|問與答/i;
const QA_TRANSITION_PAT = /接下來|現在|開始|進行|進入|即將|最後|來到|下一(個|個階段)|下個|準備|歡迎|開放|階段/;
const QA_LABEL_PAT = /^(投資先進|法人|分析師|主持人|Q)[:：]/;
const QA_TEXT_PAT = /接下來是\s*(Q&A|問答|意見交換|提問時間)|進入\s*(Q&A|問答環節|提問環節|意見交換環節)|^開放提問|Q&A\s*(時間|環節|開始)|question[\s-]*(and|&)[\s-]*answer\s*session|open (the floor|the call) for questions|we('|’)?ll now (take|open for) questions|let'?s (start|begin) the Q&A|operator instructions|now open for questions|this concludes our (key messages|prepared remarks|presentation)/i;
// 輔助訊號：非管理層提問（含提問用語）後緊接管理層回答，連續出現視為已進入問答段
const QUESTION_PAT = /請問|想請教|請教一下|請教|想問|可否請教|想了解一下|請問一下/;
const QA_MIN_SENT = 20;

// ── Pass 1（純字典，不叫 AI）：切句 + 角色判斷（無法判斷回傳 null，留給批次 AI 或 fallback） ──
function analyzeRoles(text) {
  const lines = text.split(/\n/);
  let startLine = 0;
  for (let i=0; i<lines.length; i++) {
    if (TRANSCRIPT_START_PAT.test(lines[i].trim())) { startLine = i+1; break; }
  }
  const trimmed = startLine > 0 ? lines.slice(startLine).join('\n') : text;
  const allSents = trimmed.replace(/\[\d+:\d+:\d+\]|Page \d+ of \d+|\[\d+ 分鐘\]/gi,'')
    .split(/[。！？\n\r]/).map(s=>s.trim()).filter(s=>s.length>3 && !/^\d+$/.test(s));

  if (!allSents.length) return null;

  // 標記行（#QA_START 或 ## Q&A 這類標題）本身不是逐字稿內容，只用來觸發分段，不列入分析
  const isMarker = allSents.map(s => QA_START_PAT.test(s.trim()));

  let roles = allSents.map(s => getRole(s, null)); // 先不加上下文，看純內容能不能判斷
  for (let i = 0; i < allSents.length; i++) {
    if (roles[i] === null) {
      let lastRole = i > 0 ? roles[i-1] : null;
      if (i < 20 && lastRole === 0) {
        lastRole = 1;
      }
      const ex = getRole(allSents[i], lastRole);
      if (ex !== null) roles[i] = ex;
    }
  }
  return {allSents, isMarker, roles};
}

// 角色 AI 結果套用完後，剩下真的解不開的 null（AI 關閉/失敗/沒被選進這批）用「沿用前一個已知角色」補上，
// 跟原本單檔版本的 fallback 邏輯一致
async function batchClassifyRoles(fileEntries, model, apiKey, onProgress) {
  if (!fileEntries.length) return {usedFiles: new Set(), errorFiles: new Set()};

  // 將每份檔案中 roles[i] === null 的句子前後 2 句（如果是已判斷的管理層）也抓進去，給 AI 當上下文參考
  const items = []; // {fileIdx, sentIdx, label}
  const groups = [];
  fileEntries.forEach(({fileIdx, allSents, roles}) => {
    const needIdxs = new Set();
    roles.forEach((r, i) => {
      if (r === null) {
        needIdxs.add(i);
        // 上下文 2 句
        for (let j = Math.max(0, i-2); j < i; j++) if (roles[j] === 1) needIdxs.add(j);
        for (let j = i+1; j <= Math.min(allSents.length-1, i+2); j++) if (roles[j] === 1) needIdxs.add(j);
      }
    });
    if (!needIdxs.size) return;
    const sorted = Array.from(needIdxs).sort((a,b)=>a-b);
    const merged = [];
    let start = sorted[0], end = sorted[0];
    for (let k = 1; k < sorted.length; k++) {
      if (sorted[k] === end + 1) {
        end = sorted[k];
      } else {
        merged.push([start, end]);
        start = sorted[k];
        end = sorted[k];
      }
    }
    merged.push([start, end]);
    const lines = [];
    merged.forEach(([s,e], bi) => {
      if (bi > 0) lines.push('...');
      for (let i = s; i <= e; i++) {
        const label = `F${fileIdx}S${i}`;
        const tag = roles[i]===1 ? '[管理層]' : roles[i]===0 ? '[其他]' : '[?]';
        if (roles[i] === null) items.push({fileIdx, sentIdx: i, label});
        lines.push(`${label} ${tag} ${allSents[i]}`);
      }
    });
    groups.push(lines.join('\n'));
  });

  if (!items.length) return {usedFiles: new Set(), errorFiles: new Set()};

  const chunks = packIntoChunks(groups);
  const resultMap = {};
  let lastRawResponse = '';
  for (let idx = 0; idx < chunks.length; idx++) {
    const chunk = chunks[idx];
    if (onProgress) onProgress(idx + 1, chunks.length);
    let delay = 1000, ok = false, lastErr = null;
    for (let r = 0; r < 4 && !dailyQuotaExhausted && !userAborted; r++) {
      try {
        const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
          method: 'POST',
          // Key 走 header 而非 URL query string：query string 版本的 Key 會被瀏覽器擴充功能的請求記錄器、
          // 企業 proxy 日誌、devtools HAR 匯出檔等非預期管道記下來，改用官方建議的 x-goog-api-key header 可避免這點
          headers: {'Content-Type': 'application/json', 'x-goog-api-key': apiKey},
          body: JSON.stringify({
            contents: [{parts: [{text: chunk.texts.join('\n\n')}]}],
            systemInstruction: {parts: [{text: CLASSIFY_PROMPT}]},
            // 輸出量隨 chunk 內 [?] 句數增加，8192 太容易被截斷，拉高到 32768
            generationConfig: {temperature: 0, maxOutputTokens: 32768, responseMimeType: 'application/json'}
          })
        });
        if (res.status === 429 || res.status >= 500) {
          const errText = await res.text();
          if (res.status === 429 && checkQuotaExhausted(errText, 'batchClassifyRoles')) {
            lastErr = new Error(`API error: ${res.status} - ${errText}`);
            break;
          }
          const suggested = parseRetryDelaySeconds(errText);
          const waitMs = computeWaitMs(suggested, delay);
          console.warn(`Gemini API batchClassifyRoles returned ${res.status} (attempt ${r+1}), retrying after ${Math.round(waitMs/1000)}s...`, errText);
          lastErr = new Error(`API error: ${res.status} - ${errText}`);
          await sleep(waitMs); delay *= 1.8; continue;
        }
        if (!res.ok) {
          const errText = await res.text();
          console.error(`Gemini API batchClassifyRoles returned status ${res.status}:`, errText);
          throw new Error(`API error: ${res.status} - ${errText}`);
        }
        const d = await res.json();
        const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
        lastRawResponse = raw;
        Object.assign(resultMap, JSON.parse(raw.replace(/```json|```/g, '').trim()));
        ok = true;
        break;
      } catch (e) {
        console.error(`batchClassifyRoles attempt ${r+1} failed:`, e);
        lastErr = e;
        if (r < 3) { await sleep(delay); delay *= 1.8; }
      }
    }
    // 這個 chunk 徹底失敗也不中斷：其他 chunk 的結果照樣套用，
    // 失敗 chunk 涵蓋的句子會因為 label 不在 resultMap 裡而被標進 errorFiles
    // chunk 之間固定間隔：實測 Google 用量儀表板顯示 TPM（每分鐘輸入 token 數）曾經超標，
    // 光靠切小 chunk 不夠，還需要拉開送出間隔才不會短時間內塞爆。
    // 但如果已經確認整日額度用完，後面的 chunk 再等也沒用，直接跳過間隔快速結束這個階段
    if (idx < chunks.length - 1 && !dailyQuotaExhausted && !userAborted) await sleep(2000);
  }

  const usedFiles = new Set(items.map(it => it.fileIdx));
  const errorFiles = new Set();
  const byFile = new Map();
  fileEntries.forEach(f => byFile.set(f.fileIdx, f.roles));
  items.forEach(({fileIdx, sentIdx, label}) => {
    if (label in resultMap && (resultMap[label] == 0 || resultMap[label] == 1)) {
      byFile.get(fileIdx)[sentIdx] = Number(resultMap[label]);
    } else {
      // AI 沒判斷到或漏掉的句子：保留 null 讓後續字典 fallback 補上，
      // 但該檔案要誠實標記成 AI 失敗（畫面顯示「字典」而不是「✓ AI」）
      byFile.get(fileIdx)[sentIdx] = null;
      errorFiles.add(fileIdx);
    }
  });
  return {usedFiles, errorFiles};
}

function resolveRemainingRoles(roles) {
  // 註：曾嘗試「連續超過 5 句非管理層就強制翻成管理層」的規則，
  // 但實測真實語料發現：Q&A 段分析師的長提問（含 **姓名-券商,Analyst** 標籤後的整段問題）
  // 會被大量翻成管理層發言、污染 Tone_Q（例如為升：Q 段非管理層句從 89 句被砍到只剩 5 句），故不採用。
  // 「整份檔案都找不到管理層」的極端情況由 finalizeMetrics 的救回機制處理即可。
  let ctx = 1;
  for (let i = 0; i < roles.length; i++) {
    if (roles[i] === null) {
      if (i < 20 && ctx === 0) {
        ctx = 1;
      }
      roles[i] = ctx;
    } else {
      ctx = roles[i];
    }
  }
}

// ── Pass 2（純字典，不叫 AI，需要先有已解完的 roles）：Q&A 分段判斷 ──
function analyzePhases(allSents, isMarker, roles) {
  let qaStarted = false, qaStreak = 0;
  const phases = allSents.map((s, idx) => {
    if (!qaStarted) {
      if (isMarker[idx]) {
        qaStarted = true;
      } else if (idx >= QA_MIN_SENT) {
        const sTrim = s.trim();
        // 預告句過濾：句子含「延後詞」時通常是報告段在預告稍後才有 Q&A（例：「稍後如果各位有問題，可以在 Q&A 環節回覆」），
        // 不能當成轉場觸發。但延後詞也可能只是順帶提到（例：「我們現在開始進行 Q&A，會將『之前』蒐集到的提問先回答」），
        // 所以句中同時有「立即開始詞」時仍視為真正的轉場，不套用過濾
        const hasDefer = /之前|準備|稍後|等一下|待會|結束後|報告後|簡報後|結束之後|分為|分成/i.test(sTrim);
        // 立即開始詞：實測誤殺案例補進來的樣態——
        // 「接下來是 Q&A 時間，稍後…」（上銀/榮成/華泰等，「是」後面要緊接 Q&A 概念詞，
        //   避免「接下來的幾頁是財報…稍後 Q&A 討論」這種真預告被放行）、
        // 「接下來我們就進入 Q&A」（致茂）、「接下來，針對之前收到的提問…一併回答」（榮運/迅杰）、
        // 「我會逐一進行回答」（鉅祥）
        const hasNow = /現在|正式|馬上|立刻|即刻|接(下來|著|續).{0,4}(是|進入|進行|開始)[^，。]{0,6}(Q\s*&?\s*A|問答|提問|意見交(換|流))|(一併|逐一|先)(進行)?回答|針對[^，。]{0,10}(提問|問題)[^，。]{0,8}回答/i.test(sTrim);
        const isPreAnnounce = hasDefer && !hasNow;
        let triggered = false;
        if (!isPreAnnounce) {
          if (QA_START_PAT.test(sTrim) || QA_TEXT_PAT.test(s) || QA_LABEL_PAT.test(sTrim) || (QA_CONCEPT_PAT.test(s) && QA_TRANSITION_PAT.test(s))) {
            qaStarted = true;
            triggered = true;
          }
        }
        if (!triggered) {
          if (idx > 0 && roles[idx-1]===0 && QUESTION_PAT.test(allSents[idx-1]) && roles[idx]===1) {
            qaStreak++;
            if (qaStreak >= 2) qaStarted = true;
          } else {
            qaStreak = 0;
          }
        }
      }
    }
    return qaStarted ? 1 : 0;
  });
  // 關鍵字／輔助訊號全部沒抓到轉折點時（真實逐字稿裡，有些問答轉場完全沒有可辨識的固定說法），
  // 才需要交給批次 AI 找出「從報告轉為問答」的那一句，避免每份都各自呼叫 AI 增加成本與延遲
  const needsPhaseAI = !phases.some(p => p === 1) && allSents.length > QA_MIN_SENT;
  return {phases, needsPhaseAI};
}

// ── Pass 3：套用最終 roles/phases 後計算統計數據（跟角色/分段判斷完全脫鉤，AI 介入與否都走這條） ──
function finalizeMetrics(allSents, isMarker, roles, phases) {
  // 過濾掉標記行，剩下的才是真正拿去分析的句子
  const keepIdx = [];
  for (let i=0; i<allSents.length; i++) if (!isMarker[i]) keepIdx.push(i);
  const rawSents = keepIdx.map(i=>allSents[i]);
  const finalRoles = keepIdx.map(i=>roles[i]);
  const finalPhases = keepIdx.map(i=>phases[i]);

  const hasMgmt = finalRoles.some(r => r === 1);
  if (!hasMgmt && rawSents.length > 5) {
    for (let i = 0; i < finalRoles.length; i++) {
      if (finalPhases[i] === 0) {
        finalRoles[i] = 1;
      }
    }
    const stillNoMgmt = finalRoles.every(r => r !== 1);
    if (stillNoMgmt) {
      for (let i = 0; i < finalRoles.length; i++) {
        const s = rawSents[i];
        const isQ = QA_LABEL_PAT.test(s.trim()) || QUESTION_PAT.test(s);
        if (!isQ) {
          finalRoles[i] = 1;
        }
      }
    }
  }

  const stats = {
    P:{pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0},
    Q:{pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0}
  };
  const details = [], uncIndices = [];

  rawSents.forEach((sent, i) => {
    const m = dictMatches(sent);
    const cats = localCat(sent, m); // 陣列，打平時會有多個類別
    const ref = uncRefine(sent);
    const key = finalPhases[i]===0 ? 'P' : 'Q';
    const role = finalRoles[i];
    const isUnc = cats.includes('UNC');
    if (role===1) {
      if (cats.includes('NEUTRAL')) { stats[key].neutral++; }
      else {
        stats[key].total++;
        cats.forEach(cat => {
          if (cat==='UNC') {
            stats[key].unc++;
            if (ref===1) stats[key].pos_u++;
            else if (ref===2) stats[key].neg_u++;
          } else if (cat!=='NONE') {
            const k = cat.toLowerCase();
            if (stats[key][k]!==undefined) stats[key][k]++;
          }
        });
        if (isUnc) uncIndices.push({detailIdx:details.length, key});
      }
    }
    details.push({
      sentence:sent, role, phase:finalPhases[i], localCat:cats.join('+'), refine:isUnc?ref:0, aiRefined:false,
      posWords:m.POS.join('，'),
      negWords:m.NEG.join('，'),
      litWords:m.LIT.join('，'),
      uncWords:m.UNC.join('，'),
    });
  });

  const merged = {pos:stats.P.pos+stats.Q.pos,pos_u:stats.P.pos_u+stats.Q.pos_u,neg:stats.P.neg+stats.Q.neg,neg_u:stats.P.neg_u+stats.Q.neg_u,lit:stats.P.lit+stats.Q.lit,unc:stats.P.unc+stats.Q.unc};
  return {Tone_P:calcTone(stats.P),Tone_Q:calcTone(stats.Q),Tone_T:calcTone(merged),counts:stats,details,uncIndices};
}

function empty() {
  const s={pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0};
  return {Tone_P:0,Tone_Q:0,Tone_T:0,counts:{P:{...s},Q:{...s}},details:[],uncIndices:[],aiUsed:false,aiError:false,aiAnySuccess:false};
}

// ── Gemini AI ──────────────────────────────────────────────────────
// 舊版是「每份檔案各自呼叫 AI」，2429 份的真實批次一次跑下來，光角色判斷跟 UNC 判斷加起來
// 可能就是幾千次 API 呼叫，遠遠超過免費額度（20 次/日）。改成「整批次只呼叫幾次」：
// 先把所有檔案都跑完純字典分析，把「需要 AI 幫忙」的項目（不確定角色的句子、找不到 Q&A 起點的檔案、
// UNC 句子）全部彙整成一份全域清單，再依文字量切成盡量少的幾個大請求一次送出，
// 用「F{檔案序號}S{句子序號}」這種全域唯一編號當 key，讓一次回應就能同時解掉所有檔案的問題。
const GMINI_PROMPT = `你是一位財務語言學專家。請判斷以下被字典法列為「不確定(UNC)」的句子，這句話描述的財務或營運狀況，對公司來說整體是正面還是負面訊號。
- 若整體是正面訊號 → 回傳 1，例如：業績成長、獲利提升、負債比下降、成本下降、毛利率上升、市佔提升、樂觀展望等
- 若整體是負面訊號 → 回傳 2，例如：業績衰退、獲利下滑、負債比上升、成本上升、毛利率下降、市佔流失、風險與警示等
- 若這句話只是中性敘述、看不出對公司是好是壞 → 回傳 0
請特別注意：即使句子沒有出現「成長」「風險」這類字眼，只要描述的數字或狀態變化方向對公司明顯有利或不利（例如負債比、成本、費用率等財務比率下降通常是好事，上升通常是壞事），也要據此判斷為正面或負面，不要只因為沒出現關鍵字就回傳 0。
以下每行格式為「編號 句子」，編號是全域唯一識別碼，不代表順序。
請嚴格以 JSON 物件格式回傳，key 為編號，value 為 0/1/2，不得有任何其他文字。範例：{"F3D5":1,"F3D6":0}`;

const CLASSIFY_PROMPT = `你是法人說明會逐字稿分析專家。以下是多份逐字稿中，不確定角色的句子與其前後文片段，每行格式為「編號 角色標記 句子內容」（同一份檔案的片段之間用「...」分隔，代表中間省略）。
編號格式為 F<檔案序號>S<句子序號>，是全域唯一識別碼，不代表句子的實際順序，你只需要根據每行前後文脈絡判斷該行的角色。
角色標記說明：
- [管理層] 表示這句已確定是公司管理層（總經理/執行長/財務長等）本人發言，僅供你參考上下文，不需要你判斷
- [其他] 表示這句已確定不是管理層發言（主持人/分析師/投資人等），僅供你參考上下文，不需要你判斷
- [?] 表示這句角色還不確定，需要你根據前後文的對話脈絡（例如前後是誰在說話、話題如何銜接）來判斷

請針對每一個標記為 [?] 的句子，判斷該句是否為管理層本人發言：
- 1 表示是管理層發言
- 0 表示不是管理層發言

請嚴格以 JSON 物件格式回傳，key 為該句編號（例如 "F3S57"），value 為 0 或 1，只需包含 [?] 的句子，不得有任何其他文字。範例：{"F3S57":1,"F3S61":0}`;

const QA_FINDER_PROMPT = `你是法人說明會逐字稿分析專家。以下是多份逐字稿的句子列表，每行格式為「編號 句子」，編號格式為 F<檔案序號>S<句子序號>，是全域唯一識別碼。
請針對每一份檔案（依 F 後面的檔案序號分組），各自找出「從管理層報告，正式轉為開放問答（Q&A）」的第一句編號——也就是真正開始有人（主持人或投資人）在問問題、或管理層開始處理提問內容的第一句，
而不是預告「等一下會有Q&A」這種還在報告階段的句子，也不是事後才提到「謝謝大家的提問」這種已經結束的句子。
如果某份檔案完全找不到明確的問答轉折點，該檔案不用出現在回傳結果中。
請嚴格以 JSON 物件格式回傳，key 為檔案序號（例如 "3"），value 為該檔案問答起始句的完整編號字串（例如 "F3S57"），不得有任何其他文字。範例：{"3":"F3S57","9":"F9S102"}`;

// 每次 API 請求打包的輸入文字上限（字元數）。gemini-2.5-flash context window 很大（可達百萬 token），
// 這裡刻意抓保守值（避免單次 request 過大失敗），優先把多份檔案的內容塞進同一次請求，
// 讓整批次的呼叫次數盡量壓到最少，而不是像舊版一樣一份檔案至少一次呼叫。
// 注意：角色分類的 maxOutputTokens 已配合 flash-lite 系列降到 8192，
// 如果單一 chunk 塞太多 [?] 句，回應 JSON 會被截斷導致整個 chunk 解析失敗，
// 所以 chunk 上限抓小一點（呼叫次數多一兩次，換取每次回應一定裝得下）
//
// 實測發現：Google 用量儀表板顯示 TPM（每分鐘輸入 token 數）374.1K，遠超過 250K 上限——
// 光靠壓低「每日請求數」（RPD）不夠，chunk 太大會讓「短時間內送出的 token 總量」爆掉。
// 把上限從 100000 降到 60000，最大單一 chunk 字元數可以砍掉約 4 成，
// 總請求數（拿真實 2429 份語料實測）只從 145 次增加到 245 次，仍在 500 次/日額度內綽綽有餘。
const BATCH_CHUNK_CHARS = 60000;

// 從 429 回應內容解析 Google 建議的重試秒數（RetryInfo.retryDelay 或訊息裡的「retry in Xs」），
// 而不是用固定的指數退避硬猜。實測發現：固定退避（4 次重試總共約 12 秒）常常不夠——
// TPM/RPM 這種「每分鐘」的滾動視窗限制，可能需要等到接近一分鐘視窗過去才會真的解除，
// 光靠 12 秒硬闖，剛好某個 chunk 撞到視窗還沒過去就會永久失敗，但下一個 chunk 因為晚幾秒送出、
// 視窗剛好過了又會成功——這就是「同一批裡有的 chunk 有 AI、有的又變字典」的散布狀原因，
// 不是額度整個用完那種一刀切的模式。
function parseRetryDelaySeconds(errBody) {
  try {
    const parsed = JSON.parse(errBody);
    const detail = parsed?.error?.details?.find(d => d['@type']?.includes('RetryInfo'));
    if (detail?.retryDelay) {
      const n = parseFloat(detail.retryDelay);
      if (Number.isFinite(n)) return n;
    }
    const m = /retry in ([\d.]+)s/i.exec(parsed?.error?.message || errBody);
    if (m) return parseFloat(m[1]);
  } catch (e) {}
  return null;
}

// Google 自己建議的秒數要照實遵守，不能用一個武斷的上限去蓋過去——如果 Google 說要等 90 秒，
// 蓋成 65 秒等於故意提早重試、賭一次幾乎必敗的請求，白白燒掉重試次數。
// 上限只用在「沒有 RetryInfo、只能用固定指數退避硬猜」的 fallback 路徑，避免 delay*=1.8 疊代幾輪後失控變得過長。
const FALLBACK_DELAY_CAP_MS = 65000;
function computeWaitMs(suggestedSeconds, fallbackDelayMs) {
  if (suggestedSeconds != null) return suggestedSeconds * 1000 + 500;
  return Math.min(fallbackDelayMs, FALLBACK_DELAY_CAP_MS);
}

// 判斷 429 是否為「每日額度 (RPD) 用完」，而不是 RPM/TPM 那種每分鐘滾動視窗限制。
// Google 的 QuotaFailure 錯誤會在 violations[].quotaId／quotaMetric 帶出被超過的額度種類，
// 每日額度的 quotaId 固定包含 "PerDay"（例如 "GenerateRequestsPerDayPerProjectPerModel-FreeTier"），
// 訊息文字裡通常也會直接寫 "per day"。只要命中，代表這次執行剩下的時間裡重試都不會成功，
// 要等到太平洋時間午夜額度重置才行。
function isDailyQuotaError(errBody) {
  try {
    const parsed = JSON.parse(errBody);
    const violations = parsed?.error?.details?.find(d => d['@type']?.includes('QuotaFailure'))?.violations || [];
    if (violations.some(v => /day/i.test(v.quotaId || '') || /day/i.test(v.quotaMetric || ''))) return true;
    if (/per\s*day/i.test(parsed?.error?.message || errBody)) return true;
  } catch (e) {}
  return false;
}

// 三個 AI 函式都要處理一樣的「429 且是每日額度用完」判斷與後續動作（設旗標、跳橫幅、記 log），
// 抽成共用函式後三處呼叫點不用各自維護一份幾乎一模一樣的程式碼；回傳 true 代表呼叫方應該
// 直接跳出重試迴圈（等於真正的最後一輪），不用再等、再試
function checkQuotaExhausted(errText, fnName) {
  if (!isDailyQuotaError(errText)) return false;
  console.warn(`${fnName}: 偵測到每日額度 (RPD) 已用完，本次執行不再重試 AI，直接 fallback 回字典。`, errText);
  dailyQuotaExhausted = true;
  showQuotaBanner();
  return true;
}

function packIntoChunks(groups, metas) {
  // groups: string[]，每個元素是一份檔案這個階段要送的文字區塊；metas（可選）為對應的附加資訊（例如 fileIdx），
  // 跟 groups 一一對應，回傳的每個 chunk 會一併帶出 texts 與 metas，讓呼叫方能知道這個 chunk 涵蓋哪些檔案
  const chunks = [];
  let curTexts = [], curMetas = [], curLen = 0;
  for (let i = 0; i < groups.length; i++) {
    const g = groups[i];
    if (curLen + g.length > BATCH_CHUNK_CHARS && curTexts.length) {
      chunks.push({texts: curTexts, metas: curMetas});
      curTexts = []; curMetas = []; curLen = 0;
    }
    curTexts.push(g); if (metas) curMetas.push(metas[i]); curLen += g.length;
  }
  if (curTexts.length) chunks.push({texts: curTexts, metas: curMetas});
  return chunks;
}



// 批次 Q&A 起點判斷：fileEntries = [{fileIdx, allSents}]（只包含關鍵字判斷失敗、需要 AI 的檔案）
async function batchFindQAStart(fileEntries, model, apiKey, onProgress) {
  if (!fileEntries.length) return {resultIdx: new Map(), usedFiles: new Set(), errorFiles: new Set()};
  // metas 記錄每個 chunk 涵蓋到哪些 fileIdx，這樣「這個 chunk 的請求真的失敗」才算 AI 錯誤；
  // 「請求成功、但這份檔案就是沒有轉折點」是合法結果（照 prompt 說明本來就不會出現在回傳裡），不算失敗
  const fileIdxList = fileEntries.map(f => f.fileIdx);
  const groups = fileEntries.map(({fileIdx, allSents}) =>
    allSents.slice(QA_MIN_SENT).map((s,j) => `F${fileIdx}S${QA_MIN_SENT+j} ${s}`).join('\n')
  );
  const chunks = packIntoChunks(groups, fileIdxList);

  const resultMap = {}; // "fileIdx" -> "F{fileIdx}S{n}"
  const errorFiles = new Set();
  for (let idx = 0; idx < chunks.length; idx++) {
    const chunk = chunks[idx];
    if (onProgress) onProgress(idx + 1, chunks.length);
    let delay = 1000, ok = false, lastErr = null;
    for (let r = 0; r < 4 && !dailyQuotaExhausted && !userAborted; r++) {
      try {
        const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'x-goog-api-key': apiKey},
          body: JSON.stringify({
            contents: [{parts: [{text: chunk.texts.join('\n\n')}]}],
            systemInstruction: {parts: [{text: QA_FINDER_PROMPT}]},
            generationConfig: {temperature: 0, maxOutputTokens: 8000, responseMimeType: 'application/json'}
          })
        });
        if (res.status === 429 || res.status >= 500) {
          const errText = await res.text();
          if (res.status === 429 && checkQuotaExhausted(errText, 'batchFindQAStart')) {
            lastErr = new Error(`API error: ${res.status} - ${errText}`);
            break;
          }
          const suggested = parseRetryDelaySeconds(errText);
          const waitMs = computeWaitMs(suggested, delay);
          console.warn(`Gemini API batchFindQAStart returned ${res.status} (attempt ${r+1}), retrying after ${Math.round(waitMs/1000)}s...`, errText);
          lastErr = new Error(`API error: ${res.status} - ${errText}`);
          await sleep(waitMs); delay *= 1.8; continue;
        }
        if (!res.ok) {
          const errText = await res.text();
          console.error(`Gemini API batchFindQAStart returned status ${res.status}:`, errText);
          throw new Error(`API error: ${res.status} - ${errText}`);
        }
        const d = await res.json();
        const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
        Object.assign(resultMap, JSON.parse(raw.replace(/```json|```/g, '').trim()));
        ok = true;
        break;
      } catch (e) {
        console.error(`batchFindQAStart attempt ${r+1} failed:`, e);
        lastErr = e;
        if (r < 3) { await sleep(delay); delay *= 1.8; }
      }
    }
    // chunk 徹底失敗只標記該 chunk 涵蓋的檔案，不中斷：其他 chunk 的結果照樣套用
    if (!ok) chunk.metas.forEach(fi => errorFiles.add(fi));
    // chunk 之間固定間隔，避免短時間內送出的 token 總量超過每分鐘限制（TPM）。
    // 但如果已確認整日額度用完，後面再等也沒用，直接跳過快速結束這個階段
    if (idx < chunks.length - 1 && !dailyQuotaExhausted && !userAborted) await sleep(2000);
  }

  const usedFiles = new Set(fileEntries.map(f => f.fileIdx));
  const resultIdx = new Map(); // fileIdx -> sentIdx
  fileEntries.forEach(({fileIdx}) => {
    if (errorFiles.has(fileIdx)) return;
    const label = resultMap[String(fileIdx)];
    if (!label) return; // 請求成功但沒找到轉折點，維持純字典結果，不算錯誤
    const m = /^F(\d+)S(\d+)$/.exec(label);
    if (m && Number(m[1]) === fileIdx) resultIdx.set(fileIdx, Number(m[2]));
    else errorFiles.add(fileIdx);
  });
  return {resultIdx, usedFiles, errorFiles};
}

// 批次 UNC 句子方向判斷：items = [{label, sentence}]（label 全域唯一，例如 "F3D5"）
// UNC 句子的方向判斷原則上都要真的經過 AI 分析，不能因為暫時性的額度／頻率限制就輕易放棄回字典。
// 除了每個 chunk 內部的重試，這裡再加一層「整輪重試」：一輪跑完後，把還沒拿到結果的句子收集起來，
// 等久一點（讓 RPM/TPM 這種滾動視窗有機會恢復），再重新打包送一次，最多再重試 SWEEP_MAX 輪，
// 才真的放棄、fallback 回字典。
const UNC_SWEEP_MAX = 3;
const UNC_SWEEP_COOLDOWN_MS = 15000;

async function batchRefine(items, model, apiKey, onProgress, onChunkDone) {
  if (!items.length) return {resultMap: {}, error: false};
  const resultMap = {};
  let pending = items;
  // 記錄「最近一次真的送出請求」的時間點，讓整輪重試前的冷卻改成「距離上次請求還缺多久」，
  // 而不是每次都無腦等滿 15 秒——同一輪裡最早失敗的 chunk 可能早就等超過一分鐘（冷卻其實不需要），
  // 最後一個 chunk 才剛失敗幾秒（15 秒可能還不夠），固定值對兩種情況都不準
  let lastRequestAt = 0;

  for (let sweep = 0; sweep <= UNC_SWEEP_MAX && pending.length && !dailyQuotaExhausted && !userAborted; sweep++) {
    const isLastSweep = sweep === UNC_SWEEP_MAX;
    if (sweep > 0) {
      const elapsed = performance.now() - lastRequestAt;
      const remain = Math.max(0, UNC_SWEEP_COOLDOWN_MS - elapsed);
      console.warn(`batchRefine: 第 ${sweep} 輪整批重試，還有 ${pending.length} 句沒拿到 AI 結果，距上次請求已過 ${Math.round(elapsed/1000)}s，再等 ${Math.round(remain/1000)}s 讓額度視窗恢復...`);
      if (remain > 0) await sleep(remain);
    }
    // 舊版固定「每 400 句一批」，跟句子實際長度脫鉤：真實語料通常一份就有好幾萬句 UNC，
    // 400 句/chunk 換算下來整批可能要 300+ 次請求，跟角色分類、問答起點三項加起來很容易逼近
    // 免費額度上限（500 次/日）。改成跟其他兩個 AI 階段一致的「依總字元數」動態切 chunk，
    // 每句平均長度遠短於角色分類的上下文區塊，同樣的字元預算可以塞進多好幾倍的句子，
    // 大幅減少這個階段需要的請求次數。
    // metas 傳完整的 items（含 fileIdx/detailIdx/key），這樣每個 chunk 完成時，
    // 呼叫方才知道「這個 chunk 涵蓋哪些檔案的哪些句子」，可以只更新這些檔案、不用等全部 chunk 跑完
    const groups = pending.map(it => `${it.label} ${it.sentence}`);
    const chunks = packIntoChunks(groups, pending);
    const stillMissing = [];
    for (let idx = 0; idx < chunks.length; idx++) {
      if (onProgress) onProgress(idx + 1, chunks.length);
      const msg = chunks[idx].texts.join('\n');
      let chunkResultMap = {};
      let delay = 1000, ok = false;
      for (let r = 0; r < 4 && !dailyQuotaExhausted && !userAborted; r++) {
        try {
          const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
            method: 'POST', headers: {'Content-Type': 'application/json', 'x-goog-api-key': apiKey},
            // maxOutputTokens 跟著拉高：chunk 現在裝的句數比以前多很多，輸出的 JSON 欄位數也跟著變多
            body: JSON.stringify({contents:[{parts:[{text: msg}]}], systemInstruction:{parts:[{text: GMINI_PROMPT}]}, generationConfig:{temperature:0, maxOutputTokens:32768, responseMimeType:'application/json'}})
          });
          lastRequestAt = performance.now();
          if (res.status === 429 || res.status >= 500) {
            const errText = await res.text();
            if (res.status === 429 && checkQuotaExhausted(errText, 'batchRefine')) break;
            const suggested = parseRetryDelaySeconds(errText);
            const waitMs = computeWaitMs(suggested, delay);
            console.warn(`Gemini API batchRefine returned ${res.status} (attempt ${r+1}), retrying after ${Math.round(waitMs/1000)}s...`, errText);
            await sleep(waitMs); delay *= 1.8; continue;
          }
          if (!res.ok) {
            const errText = await res.text();
            console.error(`Gemini API batchRefine returned status ${res.status}:`, errText);
            throw new Error(`API error: ${res.status} - ${errText}`);
          }
          const d = await res.json();
          const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          chunkResultMap = JSON.parse(raw.replace(/```json|```/g, '').trim());
          Object.assign(resultMap, chunkResultMap);
          ok = true; break;
        } catch (e) {
          console.error('batchRefine error:', e);
          if (r < 3) { await sleep(delay); delay *= 1.8; }
        }
      }
      const missing = chunks[idx].metas.filter(it => !(it.label in chunkResultMap));
      // 只有「最後一輪還是失敗」才算真正的錯誤、通知呼叫方 fallback 回字典；
      // 還有機會在下一輪重試的，先把這個 chunk 裡已經成功的部分套用上去，暫不標記失敗。
      // 已確認整日額度用完或使用者中止時，即使還沒到 UNC_SWEEP_MAX，之後也不會再重試了，等同真正的最後一輪。
      // 注意：這裡傳的是「這是不是最後一輪」這個 call 層級的旗標，不是「這個 chunk 有沒有缺句」——
      // 缺句與否要由呼叫方逐句判斷（chunkResultMap 裡有沒有該句的 key），
      // 不能把兩者合成一個布林值，否則同一個 chunk 裡其他明明成功的句子會被一起誤判成失敗
      if (onChunkDone) onChunkDone(chunks[idx].metas, chunkResultMap, isLastSweep || dailyQuotaExhausted || userAborted);
      stillMissing.push(...missing);
      // chunk 之間固定間隔，避免短時間內送出的 token 總量超過每分鐘限制（TPM）。
      // 但如果已確認整日額度用完，後面再等也沒用，直接跳過快速結束這個階段
      if (idx < chunks.length - 1 && !dailyQuotaExhausted && !userAborted) await sleep(2000);
    }
    pending = stillMissing;
  }
  return {resultMap, error: pending.length > 0};
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// fetch 本身沒有預設逾時，如果 API 卡住或回應極慢，await 會永遠卡住、整個批次跟著卡死。
// 用 AbortController 強制在 GEMINI_TIMEOUT_MS 後放棄這次請求，讓上層的 catch 接手、繼續跑下一份。
const GEMINI_TIMEOUT_MS = 90000;
function fetchWithTimeout(url, options, timeoutMs = GEMINI_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, {...options, signal: controller.signal}).finally(() => clearTimeout(timer));
}

// ── UI Helpers ─────────────────────────────────────────────────────
function toneColor(v){return v>0.1?'var(--pos)':v<-0.1?'var(--neg)':'var(--unc)';}
function toneBar(v,color){return `<span class="tbar"><span class="tbar-fill" style="width:${Math.min(100,Math.abs(v)*100)}%;background:${color}"></span></span>`;}
// 三種 AI 徽章狀態：全部成功／部分成功（有一部分失敗，但至少有一部分真的吃到 AI）／完全字典。
// 「部分」原本會被誤標成「字典」，讓人以為整份完全沒吃到 AI，但明細裡其實看得到「▲/▼ 修正...(AI)」——
// 用 aiAnySuccess 當作「至少有部分 AI 真的成功」的證據。
// 注意：aiAnySuccess 涵蓋角色分類／問答起點／UNC 精煉三個階段，只要任一階段對這份檔案有實際成功套用，
// 就會是 true；不能只看 details 裡有沒有 aiRefined:true，那個欄位只有 UNC 精煉會設，
// 角色分類或問答起點就算成功也不會反映在任何一句 detail 上，會被誤判成「字典」。
function aiBadge(r){
  if (r.aiUsed && !r.aiError) return '<span class="b-ai-on">✓ AI</span>';
  if (r.aiUsed && r.aiError && r.aiAnySuccess) return '<span class="b-ai-err" title="部分句子/階段成功套用 AI，其餘因失敗 fallback 回字典">部分 AI</span>';
  return '<span class="b-ai-off">字典</span>';
}
// 純文字版本，給 CSV 匯出用（aiBadge 回傳的是 HTML）。摘要報表最常被往外分享（給管理層、IR），
// 使用者如果不特地點開逐句明細，看不出這份報表的 Tone 分數有多少比例只是字典猜測，
// 這裡把資料可信度直接寫進報表本身，而不是只留在畫面上
function aiStatusText(r){
  if (r.aiUsed && !r.aiError) return 'AI完成';
  if (r.aiUsed && r.aiError && r.aiAnySuccess) return '部分AI';
  return '字典';
}

// 每日額度 (RPD) 用完的橫幅：跟 setAiStatus 分開顯示，因為 setAiStatus 會被後續各階段的
// running/done 狀態不斷覆蓋，若共用同一個位置，這則重要訊息一閃就被蓋掉，使用者根本來不及看到
function showQuotaBanner(){
  const el = document.getElementById('quota-banner');
  el.style.display = 'block';
  el.textContent = '⚠ 今日 Gemini API 每日請求額度 (RPD) 已用完，本次執行剩餘的不確定句將直接使用字典判斷、不再嘗試 AI。額度會在太平洋時間午夜重置，請等重置後再重新執行以套用 AI 分析。';
}
function hideQuotaBanner(){
  document.getElementById('quota-banner').style.display = 'none';
}

function setAiStatus(s, errMsg){
  const el=document.getElementById('ai-status');
  if(s==='running') el.innerHTML='<span class="b-ai-on">AI 分析中</span>';
  else if(s==='done') el.innerHTML='<span class="b-ai-on">✓ 完成</span>';
  else if(s==='error') {
    el.innerHTML=`<span class="b-ai-off" title="${escapeHtml(errMsg||'')}">！失敗</span>${errMsg ? `<div style="font-size:10px;color:var(--neg);margin-top:4px;white-space:pre-wrap;max-width:250px;text-align:left;line-height:1.4">${escapeHtml(errMsg)}</div>` : ''}`;
  }
  else el.innerHTML='';
}

// ── Exclusion Panel ────────────────────────────────────────────────
function renderExclPanel() {
  document.getElementById('excl-count').textContent = exclusions.length + ' 條規則';
  const bycat = {};
  exclusions.forEach(ex=>{
    if(!bycat[ex.category]) bycat[ex.category]=[];
    bycat[ex.category].push(ex);
  });
  const cats = document.getElementById('excl-cats');
  cats.innerHTML = Object.entries(bycat).map(([cat,items])=>{
    const m = CAT_META[cat]||{label:cat,cls:'cat-custom',emoji:'•'};
    const tags = items.map(ex=>`<span class="excl-tag">${escapeHtml(ex.label)}<button onclick="removeExcl('${ex.id}')">✕</button></span>`).join('');
    return `<div style="margin-top:12px"><div style="display:flex;align-items:center;margin-bottom:5px"><span class="cat-lbl ${m.cls}">${m.emoji} ${m.label}</span><span style="font-size:9px;color:var(--tx2)">${items.length} 條</span></div><div>${tags}</div></div>`;
  }).join('');
}
function toggleExcl(){
  const b=document.getElementById('excl-body');
  const a=document.getElementById('excl-arrow');
  const open = b.style.display==='none';
  b.style.display = open?'block':'none';
  a.style.transform = open?'rotate(180deg)':'';
  if(open) renderExclPanel();
}
function removeExcl(id){
  exclusions=exclusions.filter(e=>e.id!==id);
  renderExclPanel();
}
function addExclusion(){
  const v=document.getElementById('new-word').value.trim();
  if(!v) return;
  exclusions.push({id:'c_'+Date.now(),category:'custom',label:v,type:document.getElementById('new-type').value,value:v});
  document.getElementById('new-word').value='';
  renderExclPanel();
}
function resetExclusions(){exclusions=[...DEFAULT_EXCLUSIONS];renderExclPanel();}

// ── Queue ──────────────────────────────────────────────────────────
function renderQueue(){
  const g=document.getElementById('queue-grid');
  const e=document.getElementById('queue-empty');
  document.getElementById('q-count').textContent=queue.length;
  if(!queue.length){e.style.display='block';g.innerHTML='';return;}
  e.style.display='none';
  g.innerHTML=queue.map((item,i)=>{
    const cls=i===currentIdx?'active':item.status==='done'?'done':item.status==='error'?'error':'';
    const icon=item.status==='done'?`<span style="color:var(--pos)">✓</span>`:item.status==='error'?`<span style="color:var(--neg);font-size:9px">ERR</span>`:i===currentIdx?`<div style="width:10px;height:10px;border:2px solid var(--ac);border-top-color:transparent;border-radius:50%" class="spin"></div>`:`<span style="font-size:9px;color:var(--tx2)">WAIT</span>`;
    return `<div class="q-item ${cls}"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(item.name)}</span>${icon}</div>`;
  }).join('');
  const done=queue.filter(i=>i.status==='done').length;
  document.getElementById('prog-wrap').style.display=queue.length?'block':'none';
  document.getElementById('prog-fill').style.width=(done/queue.length*100)+'%';
  document.getElementById('prog-text').textContent=`${done}/${queue.length} 完成`;
  document.getElementById('run-btn').disabled=processing||!queue.length;
}

function handleFiles(inp){
  Array.from(inp.files).forEach(f=>queue.push({name:f.name.replace(/\.txt$/i,''),type:'file',content:f,status:'pending'}));
  inp.value=''; renderQueue();
}
function addManual(){
  const n=document.getElementById('m-name').value.trim();
  const t=document.getElementById('m-text').value.trim();
  if(!n||!t) return;
  queue.push({name:n,type:'text',content:t,status:'pending'});
  document.getElementById('m-name').value='';
  document.getElementById('m-text').value='';
  renderQueue();
}
function updateProgUI(percent, text) {
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('prog-fill').style.width = percent + '%';
  document.getElementById('prog-text').textContent = text;
  document.getElementById('proc-text').textContent = text;
}

function addTestSample(){
  queue.push({name:'測試樣本',type:'text',content:'各位投資先進，大家午安。歡迎參加本次法人說明會。管理層表示，公司今年業績成長顯著，獲利創歷史新高。分析師詢問風險問題。董事長回應，我們有充分準備應對不確定性。謝謝各位的聆聽，謝謝。',status:'pending'});
  renderQueue();
}
// runBatch() 執行中會用索引（pending[k]、queue[f.qIdx] 等）持續存取 queue/results，
// 這裡如果讓使用者把陣列整個換成新的空陣列，正在跑的迴圈下一次存取就會拿到 undefined 而炸掉。
// 批次跑到一半時直接擋掉，不做任何清空
function clearQueue(){ if(processing) return; queue=[];renderQueue(); }
function clearAll(){ if(processing) return; queue=[];results=[];currentIdx=-1;localStorage.removeItem('tone_results_backup');renderQueue();renderResults(); }

// ── 崩潰保護：備份已完成的分析結果 ───────────────────────────────
// 佇列裡的檔案（File 物件／尚未上傳的內容）無法序列化進 localStorage，沒辦法整批復原；
// 但已經算出來的 results（字典＋AI 分析分數）是純資料，備份成本低、也是使用者最不想遺失的部分。
// 只在 Pass 5 剛寫入初步結果、以及整批次結束時備份兩個時機點，不在 Pass 6 每個 chunk 都寫，
// 避免大批次下每個 chunk 都整包 JSON.stringify 寫入 localStorage 造成效能負擔或撞到儲存配額
// （persistSet 內部已經 try/catch，配額爆掉時只是安靜地不寫入，不會讓分析中斷）。
function backupResults(){
  if (!results.length) return;
  persistSet('tone_results_backup', results);
}
function restoreBackup(){
  const backup = persistGet('tone_results_backup', null);
  document.getElementById('restore-banner').style.display = 'none';
  if (!backup || !backup.length) return;
  results = backup;
  renderResults();
}
function dismissBackup(){
  localStorage.removeItem('tone_results_backup');
  document.getElementById('restore-banner').style.display = 'none';
}

// ── Run ────────────────────────────────────────────────────────────
// 整個批次分成幾個階段跑：先把所有檔案都做完純字典分析（不叫 AI），
// 再把「需要 AI 幫忙」的項目整批彙整起來，一次性（或依大小切成盡量少的幾個請求）送給 Gemini，
// 而不是像舊版一樣每份檔案各自呼叫 AI（幾千份檔案就是幾千次呼叫，免費額度一下就用完）。
// Pass 5（角色/問答段都確定後）就會把當下算出來的分數先寫進結果表格顯示出來，
// 不用等 chunk 數最多、AI 失敗時重試最久的 Pass 6（UNC 精煉）整個跑完才看得到任何東西；
// Pass 6 如果有結果，會直接更新同一批已顯示的資料，不會重複新增一份。
async function runBatch(){
  if(processing||!queue.length) return;
  processing=true;
  document.getElementById('proc-badge').style.display='flex';
  document.getElementById('run-btn').disabled=true;
  document.getElementById('abort-btn').style.display='block';
  setAiStatus('');
  dailyQuotaExhausted = false;
  userAborted = false;
  hideQuotaBanner();
  // 六個 Pass 中有任何一個拋出沒被內部 try/catch 接住的例外，都要確保 processing 被重設、
  // 按鈕恢復可按——否則 processing 卡在 true，使用者只能重新整理整個頁面才能再跑一次
  try {
  const apiKey=document.getElementById('api-key').value.trim();
  const model='gemini-flash-lite-latest'; // 固定用官方 -latest 別名，不開放使用者選擇，避免選到已除役或額度低的版本
  const aiOn=apiKey.length>10;
  const RENDER_MIN_INTERVAL = 300;
  let lastRenderAt = 0;

  const pending = [];
  for (let i=0;i<queue.length;i++) if (queue[i].status!=='done') pending.push(i);

  // ── Pass 1：純字典分析（切句 + 角色），不叫 AI ──────────────────
  const files = []; // {qIdx, fileIdx, name, allSents, isMarker, roles, aiUsed, aiError}
  for (let k=0; k<pending.length; k++) {
    if (userAborted) break; // 2000+ 檔案時單純字典解析也不是瞬間完成，中止要在這裡也生效，不是只擋 AI 呼叫
    const i = pending[k];
    currentIdx = i;
    updateProgUI(Math.round((k / pending.length) * 10), `[1/5] 本地解析中 (${k+1}/${pending.length})`);
    const now = performance.now();
    const shouldRender = (now - lastRenderAt >= RENDER_MIN_INTERVAL) || k === pending.length-1;
    if (shouldRender) { renderQueue(); lastRenderAt = now; }
    try {
      let text;
      if(queue[i].type==='file'){
        const buf=await queue[i].content.arrayBuffer();
        try{text=new TextDecoder('utf-8',{fatal:true}).decode(buf);}
        catch{text=new TextDecoder('big5').decode(buf);}
      } else text=queue[i].content;
      const local = analyzeRoles(text);
      if (!local) { results.push({name:queue[i].name,...empty()}); queue[i].status='done'; continue; } // 空白/無有效句內容，視為合法的全零結果，不算錯誤
      files.push({qIdx:i, fileIdx:k, name:queue[i].name, allSents:local.allSents, isMarker:local.isMarker, roles:local.roles, aiUsed:false, aiError:false, aiAnySuccess:false});
    } catch(e) { queue[i].status='error'; }
    if (shouldRender) await sleep(0);
  }
  currentIdx = -1;

  // ── Pass 2：批次角色分類 AI（整批只呼叫幾次，而不是一份檔案一次）──────
  if (aiOn && !userAborted) {
    const needRoles = files.filter(f => f.roles.some(r => r===null));
    if (needRoles.length) {
      updateProgUI(10, `[2/5] AI 角色判斷中...`);
      setAiStatus('running'); renderQueue();
      // AI 失敗時 fallback 用字典補上，但 aiError 要如實標記——
      // 畫面上該檔案顯示「字典」而不是「✓ AI」，使用者才知道哪些檔案其實沒吃到 AI
      try {
        const {usedFiles, errorFiles} = await batchClassifyRoles(needRoles.map(f=>({fileIdx:f.fileIdx, allSents:f.allSents, roles:f.roles})), model, apiKey, (curr, tot) => updateProgUI(10 + Math.round((curr / tot) * 40), `[2/5] AI 角色判斷中 (${curr}/${tot} 分組)`));
        files.forEach(f => {
          if (usedFiles.has(f.fileIdx)) f.aiUsed = true;
          if (errorFiles.has(f.fileIdx)) f.aiError = true;
          else if (usedFiles.has(f.fileIdx)) f.aiAnySuccess = true; // 有送出、且沒被記到失敗，代表這份檔案的角色判斷確實吃到 AI
        });
        setAiStatus(errorFiles.size ? 'error' : 'done');
      } catch (e) {
        console.error("AI 角色判斷失敗，改用字典 fallback:", e);
        needRoles.forEach(f => { f.aiUsed = true; f.aiError = true; });
        setAiStatus('error', String(e.message||e).slice(0,200));
      }
    }
  }
  files.forEach(f => resolveRemainingRoles(f.roles));

  // ── Pass 3：Q&A 分段判斷（純字典，需要先有已解完的角色）──────────
  const needPhaseAI = [];
  files.forEach(f => {
    const {phases, needsPhaseAI} = analyzePhases(f.allSents, f.isMarker, f.roles);
    f.phases = phases;
    if (needsPhaseAI) needPhaseAI.push(f);
  });

  // ── Pass 4：批次 Q&A 起點 AI（只有關鍵字判斷失敗的檔案才需要）───────
  if (aiOn && needPhaseAI.length && !userAborted) {
    updateProgUI(50, `[3/5] AI 問答起點定位中...`);
    setAiStatus('running'); renderQueue();
    try {
      const {resultIdx, usedFiles, errorFiles} = await batchFindQAStart(needPhaseAI.map(f=>({fileIdx:f.fileIdx, allSents:f.allSents})), model, apiKey, (curr, tot) => updateProgUI(50 + Math.round((curr / tot) * 25), `[3/5] AI 問答起點定位中 (${curr}/${tot} 分組)`));
      needPhaseAI.forEach(f => {
        if (usedFiles.has(f.fileIdx)) f.aiUsed = true;
        if (errorFiles.has(f.fileIdx)) f.aiError = true;
        else if (usedFiles.has(f.fileIdx)) f.aiAnySuccess = true; // 請求成功（找不到轉折點也算合法結果），不是失敗
        const foundIdx = resultIdx.get(f.fileIdx);
        if (foundIdx !== undefined) for (let i=foundIdx; i<f.phases.length; i++) f.phases[i]=1;
      });
      setAiStatus(errorFiles.size ? 'error' : 'done');
    } catch (e) {
      console.error("AI 問答起點判斷失敗，維持字典分段結果:", e);
      needPhaseAI.forEach(f => { f.aiUsed = true; f.aiError = true; });
      setAiStatus('error', String(e.message||e).slice(0,200));
    }
  }

  // ── Pass 5：計算統計數據，收集 UNC 句子（純字典，先不套用 AI 方向）───
  const uncPool = []; // {label, sentence, fileIdx, detailIdx, key}
  files.forEach(f => {
    f.metrics = finalizeMetrics(f.allSents, f.isMarker, f.roles, f.phases);
    f.metrics.uncIndices.forEach(u => {
      uncPool.push({label:`F${f.fileIdx}D${u.detailIdx}`, sentence:f.metrics.details[u.detailIdx].sentence, fileIdx:f.fileIdx, detailIdx:u.detailIdx, key:u.key});
    });
  });

  // ── 提早揭露：這裡的分數已經是完整、有效的結果（字典＋角色/問答 AI，只差 UNC 精煉還沒套用），
  // 先寫進 results 並畫出來，不要等 Pass 6（chunk 數最多、AI 失敗時重試最久）整個跑完才讓使用者看到任何東西。
  // Pass 6 如果有結果，會在下面直接更新這裡已經顯示的同一筆資料，不會重複新增。
  files.forEach(f => {
    f.resultIdx = results.length;
    results.push({name:f.name, ...f.metrics, aiUsed:f.aiUsed, aiError:f.aiError, aiAnySuccess:f.aiAnySuccess});
    queue[f.qIdx].status='done';
  });
  updateProgUI(75, `[4/5] 已顯示初步結果，AI 不確定句精煉中...`);
  renderQueue(); renderResults();
  backupResults();

  // ── Pass 6：批次 UNC 方向 AI（整批只呼叫幾次，但每個 chunk 一完成就更新畫面）───
  if (aiOn && uncPool.length && !userAborted) {
    setAiStatus('running');
    const byFile = new Map();
    files.forEach(f => byFile.set(f.fileIdx, f));

    // 重新計算單一檔案的 Tone 分數並寫回 results（只在這個 chunk 有影響到的檔案才做，不用整批重算）
    function recalcAndUpdate(f) {
      if (!f.metrics.uncIndices.length) return;
      const nc = {P:{...f.metrics.counts.P,pos_u:0,neg_u:0}, Q:{...f.metrics.counts.Q,pos_u:0,neg_u:0}};
      f.metrics.uncIndices.forEach(u => {
        const v = f.metrics.details[u.detailIdx].refine;
        if (v===1) nc[u.key].pos_u++;
        else if (v===2) nc[u.key].neg_u++;
      });
      const m = {pos:nc.P.pos+nc.Q.pos,pos_u:nc.P.pos_u+nc.Q.pos_u,neg:nc.P.neg+nc.Q.neg,neg_u:nc.P.neg_u+nc.Q.neg_u,lit:nc.P.lit+nc.Q.lit,unc:nc.P.unc+nc.Q.unc};
      f.metrics.counts = nc;
      f.metrics.Tone_P = calcTone(nc.P); f.metrics.Tone_Q = calcTone(nc.Q); f.metrics.Tone_T = calcTone(m);
      results[f.resultIdx] = {name:f.name, ...f.metrics, aiUsed:f.aiUsed, aiError:f.aiError, aiAnySuccess:f.aiAnySuccess};
    }

    let hadAnyError = false;
    // chunk 一結束（不管成功或失敗）就套用、重算、重畫，不用等剩下幾十個 chunk 都跑完。
    // 注意：chunkFailed 是「這個 chunk 裡有沒有任何一句在最後一輪仍拿不到結果」的整批旗標，
    // 但一個 chunk 通常橫跨多份檔案、多個句子，裡面可能大部分句子其實有拿到結果——
    // 之前直接用這個旗標當「這個 chunk 的每一句都失敗」來處理，會把已經成功、有真正 AI
    // 判斷值的句子也一併丟棄、標成失敗，等於白白浪費掉本來就正確拿到的 AI 結果。
    // 改成逐句判斷：每一句先看自己有沒有拿到有效值，沒有才依 chunkFailed 決定是否算數真正失敗
    const onChunkDone = (chunkItems, chunkResultMap, chunkFailed) => {
      const affected = new Set();
      chunkItems.forEach(u => {
        const f = byFile.get(u.fileIdx);
        if (!f) return;
        f.aiUsed = true;
        affected.add(u.fileIdx);
        const v = chunkResultMap[u.label];
        if (v == 0 || v == 1 || v == 2) {
          f.metrics.details[u.detailIdx].refine = Number(v);
          f.metrics.details[u.detailIdx].aiRefined = true;
          f.aiAnySuccess = true;
        } else if (chunkFailed) {
          // 這一句在最後一輪依然沒拿到結果，才是這一句真正的失敗
          f.aiError = true; hadAnyError = true;
        }
      });
      affected.forEach(fi => recalcAndUpdate(byFile.get(fi)));
      // 數字一定每個 chunk 都重算（上面 recalcAndUpdate 不受影響），但重畫整張表／整個 grid 這種
      // O(已完成筆數) 的 DOM 重建套用 Pass 1 自己訂的節流間隔，避免大批次（UNC chunk 數上百上千時）
      // 每個 chunk 都整表重繪造成卡頓；沿用同一組 RENDER_MIN_INTERVAL/lastRenderAt，跟 Pass 1 一致
      const now = performance.now();
      if (now - lastRenderAt >= RENDER_MIN_INTERVAL) {
        renderQueue(); renderResults();
        lastRenderAt = now;
      }
    };

    const {error} = await batchRefine(uncPool, model, apiKey,
      (curr, tot) => updateProgUI(75 + Math.round((curr / tot) * 20), `[4/5] AI 不確定句精煉中 (${curr}/${tot} 分組，已即時更新畫面)`),
      onChunkDone);
    setAiStatus((error || hadAnyError) ? 'error' : 'done');
  }

  } finally {
    // ── 收尾（不管中途是否拋出例外，都一定會執行）────────────────
    processing=false; currentIdx=-1;
    if (userAborted) setAiStatus('error', '已中止：剩餘尚未完成的檔案仍留在佇列中（不會被標記為已完成），可以直接重新按下開始繼續分析。');
    renderQueue(); renderResults();
    backupResults();
    document.getElementById('proc-badge').style.display='none';
    document.getElementById('run-btn').disabled=false;
    document.getElementById('abort-btn').style.display='none';
  }
}

// 只針對「已經算出結果、但不確定句還沒真正拿到 AI 判斷（字典 fallback）」的句子重新呼叫 AI，
// 不重新上傳、不重新解析任何檔案——不管是當天額度用完、使用者中途按了中止、還是單純某個 chunk
// 剛好失敗，事後想把殘留的失敗句子補完，都不需要把整批 2000+ 份檔案從頭跑一次浪費額度。
// 直接從 results[].uncIndices／details 找出還沒 aiRefined 的句子，組成新的一批送給 batchRefine，
// 沿用跟 runBatch() Pass 6 完全一樣的「chunk 一完成就更新畫面」與逐句成功/失敗判斷邏輯。
async function reapplyAI(){
  if (processing) return;
  const apiKey=document.getElementById('api-key').value.trim();
  if (apiKey.length<=10) { alert('請先在上方輸入 Gemini API Key'); return; }
  const model='gemini-flash-lite-latest';

  const pool = []; // {label, sentence, resultIdx, detailIdx, key}
  results.forEach((r, ri) => {
    (r.uncIndices||[]).forEach(u => {
      const d = r.details[u.detailIdx];
      if (!d.aiRefined) pool.push({label:`R${ri}D${u.detailIdx}`, sentence:d.sentence, resultIdx:ri, detailIdx:u.detailIdx, key:u.key});
    });
  });
  if (!pool.length) { alert('目前所有不確定句都已經拿到 AI 判斷了，沒有需要補套用的句子'); return; }

  processing = true;
  document.getElementById('proc-badge').style.display='flex';
  document.getElementById('run-btn').disabled=true;
  document.getElementById('abort-btn').style.display='block';
  dailyQuotaExhausted = false;
  userAborted = false;
  hideQuotaBanner();
  setAiStatus('running');
  updateProgUI(0, `補套用 AI 判斷中 (0/${pool.length} 句)...`);

  try {
    // 跟 runBatch() Pass 6 的 recalcAndUpdate 邏輯一致，只是直接操作 results[ri] 本身，
    // 不用透過 files/byFile 這層中介（那個陣列跑完 runBatch() 就消失了，這裡本來就沒有）
    function recalcAndUpdate(ri) {
      const r = results[ri];
      if (!r.uncIndices.length) return;
      const nc = {P:{...r.counts.P,pos_u:0,neg_u:0}, Q:{...r.counts.Q,pos_u:0,neg_u:0}};
      r.uncIndices.forEach(u => {
        const v = r.details[u.detailIdx].refine;
        if (v===1) nc[u.key].pos_u++;
        else if (v===2) nc[u.key].neg_u++;
      });
      const m = {pos:nc.P.pos+nc.Q.pos,pos_u:nc.P.pos_u+nc.Q.pos_u,neg:nc.P.neg+nc.Q.neg,neg_u:nc.P.neg_u+nc.Q.neg_u,lit:nc.P.lit+nc.Q.lit,unc:nc.P.unc+nc.Q.unc};
      r.counts = nc;
      r.Tone_P = calcTone(nc.P); r.Tone_Q = calcTone(nc.Q); r.Tone_T = calcTone(m);
    }

    let hadAnyError = false;
    const onChunkDone = (chunkItems, chunkResultMap, chunkFailed) => {
      const affected = new Set();
      chunkItems.forEach(u => {
        const r = results[u.resultIdx];
        if (!r) return;
        r.aiUsed = true;
        affected.add(u.resultIdx);
        const v = chunkResultMap[u.label];
        if (v == 0 || v == 1 || v == 2) {
          r.details[u.detailIdx].refine = Number(v);
          r.details[u.detailIdx].aiRefined = true;
          r.aiAnySuccess = true;
        } else if (chunkFailed) {
          r.aiError = true; hadAnyError = true;
        }
      });
      affected.forEach(ri => recalcAndUpdate(ri));
      renderQueue(); renderResults();
    };

    const {error} = await batchRefine(pool, model, apiKey,
      (curr, tot) => updateProgUI(Math.round((curr / tot) * 100), `補套用 AI 判斷中 (${curr}/${tot} 分組，已即時更新畫面)...`),
      onChunkDone);
    setAiStatus((error || hadAnyError) ? 'error' : 'done');
  } finally {
    processing = false;
    if (userAborted) setAiStatus('error', '已中止：尚未處理到的句子維持原本結果，可以再次按下「補套用 AI」繼續。');
    renderQueue(); renderResults();
    backupResults();
    document.getElementById('proc-badge').style.display='none';
    document.getElementById('run-btn').disabled=false;
    document.getElementById('abort-btn').style.display='none';
  }
}

// 使用者主動中止：只設旗標，讓所有已在跑的 for 迴圈與 sweep 迴圈在下一次迭代自然跳出，
// 不用 AbortController 硬砍 fetch——這樣已經送出、正在等回應的那一個請求還是會正常拿到結果並套用，
// 只是不會再送出新的請求，行為跟 dailyQuotaExhausted 快速失敗的機制完全一致
function abortBatch(){
  if (!processing) return;
  userAborted = true;
